<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital School Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
         @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap');
        /* [તમારી બધી જ CSS સ્ટાઇલ્સ અહીં સામેલ છે] *
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&display=swap');
        body {
            background: linear-gradient(135deg,#f5f7fa,#e4ecf7,#d9e4f5);
            min-height: 100vh;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        /* --- PREMIUM HEADER --- */
        .school-header {
            position: relative;
            overflow: hidden;
            background: linear-gradient(270deg, #4facfe, #00f2fe, #4facfe);
            background-size: 400% 400%;
            animation: headerGradientMove 8s ease infinite;
            padding: 20px 5%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        @keyframes headerGradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .school-header::after {
            content: ""; position: absolute; top: 0; left: -75%; width: 50%; height: 100%;
            background: linear-gradient(120deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.1) 100%);
            transform: skewX(-25deg); animation: headerShine 5s infinite;
        }

        @keyframes headerShine { 0% { left: -75%; } 100% { left: 125%; } }

        .header-content { display: flex; align-items: center; gap: 20px; }
        
        .logo {
            width: 85px; height: 85px; border-radius: 50%; object-fit: cover;
            border: 4px solid #fff; background: #fff;
            animation: logoEntry 6s ease-in-out infinite;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        @keyframes logoEntry {
            0% { transform: translateX(100vw) scale(0.8); opacity: 0; }
            20% { transform: translateX(0) scale(1); opacity: 1; }
            40% { transform: translateY(-8px); box-shadow: 0 0 20px #00e6ff; }
            70% { transform: translateY(0); opacity: 1; }
            100% { transform: translateX(-100vw); opacity: 0; }
        }

        .school-title { 
            font-size: 26px; font-weight: 700; color: #003366; 
            background: linear-gradient(45deg, #001f4d, #003366);
            -webkit-background-clip: text;
        }
        
        .school-subtitle { font-size: 16px; color: #004080; font-weight: 600; }

        .animate-charcter {
            text-transform: uppercase;
            background-image: linear-gradient(-225deg, yellow 0, yellow 29%, cyan 67%, cyan 100%);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textclip 2s linear infinite;
            display: inline-block; font-weight: 800; font-size: 15px; letter-spacing: 1px;
        }
        @keyframes textclip { to { background-position: 200% center; } }

        /* --- MAIN CARD DESIGN --- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; flex: 1; }
        .card {
            background: #ffffff; border-radius: 25px; padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: none;
        }

        .welcome-section { text-align: center; margin-bottom: 35px; }
        .welcome-section h2 { color: #1e3a8a; font-size: 24px; margin-bottom: 10px; }

        .btn-group { display: flex; flex-direction: column; gap: 20px; }
        
        .card-btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 30px; border-radius: 15px; text-decoration: none;
            color: white; font-weight: bold; font-size: 19px;
            transition: 0.4s; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .card-btn:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.2); }
        
        .staff-bg { background: linear-gradient(45deg, #4facfe, #00f2fe); }
        .student-bg { background: linear-gradient(45deg, #43cea2, #185a9d); }
        .reg-bg { background: linear-gradient(45deg, #f093fb, #f5576c); }

        /* --- PREMIUM FOOTER --- */
        footer {
            margin-top: 50px;
            background: linear-gradient(45deg, #1e3a8a, #1e40af);
            padding: 30px 10px; text-align: center; color: white;
        }

        .owner-img {
            width: 110px; height: 110px; border-radius: 50%; object-fit: contain;
            background: #ffffff; padding: 8px; border: 5px solid transparent;
            position: relative; transition: 0.4s ease-in-out;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .owner-img:hover { transform: translateY(-8px) scale(1.08); box-shadow: 0 20px 40px rgba(0,0,0,0.35), 0 0 25px rgba(0,242,254,0.8); }

        .owner-name {
            font-size: 22px; font-weight: 800; letter-spacing: 1px; margin-top: 10px;
            background: linear-gradient(45deg,#FFD700,#fff,#FFD700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .owner-phone {
            font-size: 16px; margin-top: 10px; font-weight: 700;
            color: #ffffff; background: linear-gradient(45deg,#43cea2,#185a9d);
            padding: 8px 20px; border-radius: 25px; display: inline-block;
        }
    </style>
</head>
<body>



<style>
    /* ગ્રીડ લેઆઉટ સેટિંગ્સ */
    .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        margin-top: 20px;
    }

    /* અત્યાધુનિક કાર્ડ ડિઝાઇન */
    .modern-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 25px;
        padding: 40px 20px;
        text-align: center;
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    /* હોવર ઇફેક્ટ */
    .modern-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    /* આઇકોન સ્ટાઇલ */
    .card-icon {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 35px;
        margin-bottom: 20px;
        transition: 0.3s;
        color: white;
    }

    .modern-card h3 {
        font-size: 20px;
        color: #2c3e50;
        margin-bottom: 10px;
    }

    .modern-card p {
        font-size: 14px;
        color: #7f8c8d;
    }

    /* કાર્ડ વાઇઝ કલર્સ */
    .staff-card .card-icon { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .student-card .card-icon { background: linear-gradient(135deg, #43cea2, #185a9d); }
    .register-card .card-icon { background: linear-gradient(135deg, #f093fb, #f5576c); }

    /* નીચેની નાની એરો લાઈન */
    .card-arrow {
        margin-top: 15px;
        font-size: 18px;
        opacity: 0;
        transform: translateX(-10px);
        transition: 0.3s;
    }
    .modern-card:hover .card-arrow {
        opacity: 1;
        transform: translateX(0);
    }

    /* રિસ્પોન્સિવ (મોબાઈલ માટે) */
    @media (max-width: 600px) {
        .card-grid { grid-template-columns: 1fr; }
    }
</style>

   

   


<div class="container">
    <div class="welcome-section">
        <h2>Digital School Services</h2>
        <p style="color: #64748b; font-weight: 600;">તમારો રોલ પસંદ કરી આગળ વધો</p>
    </div>

    <div class="card-grid">
        <!-- સ્ટાફ કાર્ડ -->
        <a href="login.html" class="modern-card staff-card">
            <div class="card-icon">
                <i class="fas fa-user-tie"></i>
            </div>
            <h3>શાળા સ્ટાફ</h3>
            <p>હાજરી, ગુણ અને એડમિન કામગીરી માટે</p>
            <div class="card-arrow" style="color: #4facfe;"><i class="fas fa-arrow-right"></i></div>
        </a>

        <!-- વિદ્યાર્થી કાર્ડ -->
        <a href="student-login.html" class="modern-card student-card">
            <div class="card-icon">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h3>વિદ્યાર્થીઓ</h3>
            <p>ઓનલાઇન રિઝલ્ટ અને પ્રોફાઇલ જોવા માટે</p>
            <div class="card-arrow" style="color: #43cea2;"><i class="fas fa-arrow-right"></i></div>
        </a>

        <!-- નવી નોંધણી કાર્ડ -->
        <a href="register.html" class="modern-card register-card">
            <div class="card-icon">
                <i class="fas fa-school"></i>
            </div>
            <h3>નવી નોંધણી</h3>
            <p>તમારી શાળાને ડિજિટલ બનાવવા માટે</p>
            <div class="card-arrow" style="color: #f5576c;"><i class="fas fa-arrow-right"></i></div>
        </a>
    </div>
</div>

<footer>
    <div class="footer-slider">
        <div class="footer-item active">
            <img src="1913_Digital School System_UG_-01.jpg" class="owner-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/167/167707.png'">
            <div class="owner-name">Digital School Services</div>
            <div class="owner-title" style="color: #bdc3c7;">DSS Version 4.0</div>
            <div class="owner-phone"><i class="fas fa-phone-alt"></i> mobile: +91 96878 93060</div>
        </div>
    </div>
    <div class="copyright" style="margin-top: 20px; font-size: 12px; opacity: 0.7;">
        &copy; 2026. All Rights Reserved.
    </div>
</footer>

</body>
</html>
